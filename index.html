<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Bakery</title>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="container header__wrapper">
            <nav>
                <a href="#" class="logo">BKR</a>
                <ul class="nav__list">
                    <li><a href="#about">About</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Recipes</a></li>
                </ul>
            </nav>
            <button class="btn">Contact</button>
        </div>
    </header>
    <main>
        <!-- HERO -->
        <section id="hero">
            <div class="container hero__wrapper">
                <div class="hero__content">
                    <img src="./images/pngegg (3) 1.png" alt="" class="hero__decor">
                    <div class="hero__info">
                        <p class="hero__subtitle">Sience 1984</p>
                        <img src="./images/Combined Shape.png" alt="" class="hero__shape">
                        <h1 class="hero__title">Fresh <br> Bakery <br> Every Day</h1>
                        <p class="hero__text">Even the all-powerful Pointing has no control <br> about the blind
                            texts it is an almost.</p>
                    </div>
                </div>
                <div class="hero__image">
                    <img src="./images/Background.png" alt="" class="hero__img">
                </div>
            </div>
        </section>
        <!-- ABOUT -->
        <section id="about">
            <div class="container about__wrapper">
                <div class="about__image-box">
                    <div class="bitmap1">
                        <img src="./images/Bitmap.png" alt="">
                    </div>
                    <div class="shape1">
                        <img src="./images/Combined Shape (1).png" alt="">
                    </div>
                    <div class="shape">
                        <img src="./images/Shape.png" alt="">
                    </div>
                    <div class="shape2">
                        <img src="./images/Combined Shape (2).png" alt="">
                    </div>
                    <div class="bitmap2">
                        <img src="./images/Bitmap (1).png" alt="">
                    </div>
                </div>
                <div class="about__content">
                    <span class="about__subtitle">About Us</span>
                    <h2 class="about__title">Baking Special Moments</h2>
                    <div class="about__info">
                        <div class="about__info-scroll"></div>
                        
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <!-- <div class="container"></div> -->
    </footer>
</body>

</html>
